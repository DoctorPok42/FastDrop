name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: self-hosted
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:frontend-${{ github.sha }}
      -
        name: Build and push backend
        uses: docker/build-push-action@v3
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:backend-${{ github.sha }}

  deploy:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      -
        name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:${{ github.sha }}
            docker compose -f compose.yml up -d --force-recreate

  update_latest:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Update latest tag
        run: |
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:frontend-${{ github.sha }}
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:backend-${{ github.sha }}
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:frontend-${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:frontend-latest
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:backend-${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:backend-latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:frontend-latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/fastdrop:backend-latest
